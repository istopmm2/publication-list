<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iStopMM | Publication Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e17;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --published: #10b981;
    --accepted: #6366f1;
    --review: #f59e0b;
    --submitted: #3b82f6;
    --preparation: #64748b;
    --danger: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* LOGIN */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: var(--bg);
    position: relative;
  }

  #login-screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 50% at 20% 40%, rgba(59,130,246,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 60%, rgba(99,102,241,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 48px;
    width: 100%;
    max-width: 400px;
    position: relative;
  }

  .login-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), #6366f1);
  }

  .login-logo {
    font-family: 'Fraunces', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }

  .login-logo-img {
    display: block;
    width: 160px;
    margin-bottom: 20px;
  }

  .login-sub {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 36px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 8px;
  }

  .form-group input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }

  .form-group input:focus {
    border-color: var(--accent);
  }

  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 2px;
    padding: 13px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-top: 8px;
  }

  .btn-primary:hover { background: var(--accent2); }
  .btn-primary:active { transform: scale(0.99); }

  .login-error {
    color: var(--danger);
    font-size: 11px;
    margin-top: 12px;
    text-align: center;
    min-height: 16px;
  }

  /* APP */
  #app { display: none; min-height: 100vh; }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .header-logo {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
  }

  .header-logo-img {
    height: 32px;
  }

  .header-divider {
    width: 1px;
    height: 20px;
    background: var(--border);
  }

  .header-title {
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text3);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .stat-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 4px 12px;
    font-size: 11px;
    color: var(--text2);
  }

  .stat-pill span {
    color: var(--accent2);
    font-weight: 500;
  }

  .btn-add {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 2px;
    padding: 8px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-add:hover { background: var(--accent2); }

  .btn-logout {
    background: transparent;
    color: var(--text3);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 7px 14px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }

  .btn-logout:hover { color: var(--text); border-color: var(--text3); }

  .main {
    padding: 32px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .category-section {
    margin-bottom: 40px;
  }

  .category-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .category-name {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 300;
    color: var(--text);
  }

  .category-count {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 3px 8px;
  }

  .papers-table {
    width: 100%;
    border-collapse: collapse;
  }

  .papers-table th {
    text-align: left;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    font-weight: 400;
  }

  .papers-table td {
    padding: 12px 12px;
    border-bottom: 1px solid rgba(30,45,69,0.5);
    font-size: 12px;
    vertical-align: middle;
  }

  .paper-row {
    cursor: pointer;
    transition: background 0.1s;
  }

  .paper-row:hover { background: var(--surface2); }

  .paper-title {
    color: var(--text);
    font-size: 12px;
    line-height: 1.5;
    max-width: 480px;
  }

  .paper-author {
    color: var(--text2);
    font-size: 11px;
    white-space: nowrap;
  }

  .paper-journal {
    color: var(--text3);
    font-size: 11px;
    font-style: italic;
    white-space: nowrap;
    max-width: 160px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .paper-notes {
    color: var(--text3);
    font-size: 11px;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .status-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 2px;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
    border: 1px solid transparent;
    user-select: none;
  }

  .status-badge:hover { opacity: 0.8; transform: scale(0.97); }

  .status-Published { background: rgba(16,185,129,0.15); color: var(--published); border-color: rgba(16,185,129,0.3); }
  .status-Accepted { background: rgba(99,102,241,0.15); color: #818cf8; border-color: rgba(99,102,241,0.3); }
  .status-Under-review { background: rgba(245,158,11,0.15); color: var(--review); border-color: rgba(245,158,11,0.3); }
  .status-Submitted { background: rgba(59,130,246,0.15); color: var(--submitted); border-color: rgba(59,130,246,0.3); }
  .status-In-preparation { background: rgba(100,116,139,0.15); color: var(--preparation); border-color: rgba(100,116,139,0.3); }

  .delete-btn {
    background: transparent;
    border: none;
    color: var(--text3);
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 2px;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
  }

  .paper-row:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: var(--danger); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 36px;
    width: 100%;
    max-width: 560px;
    position: relative;
  }

  .modal::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), #6366f1);
  }

  .modal-title {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 300;
    color: var(--text);
    margin-bottom: 24px;
  }

  .modal .form-group { margin-bottom: 14px; }

  .modal .form-group input,
  .modal .form-group select,
  .modal .form-group textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
  }

  .modal .form-group select option { background: var(--surface); }
  .modal .form-group input:focus,
  .modal .form-group select:focus,
  .modal .form-group textarea:focus { border-color: var(--accent); }

  .modal .form-group textarea { resize: vertical; min-height: 80px; }

  .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 24px;
  }

  .btn-cancel {
    background: transparent;
    color: var(--text3);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 9px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: color 0.15s;
  }

  .btn-cancel:hover { color: var(--text); }

  .btn-save {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 2px;
    padding: 9px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: background 0.15s;
  }

  .btn-save:hover { background: var(--accent2); }

  .empty-state {
    padding: 24px 12px;
    color: var(--text3);
    font-size: 11px;
    font-style: italic;
  }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--text3);
    font-size: 12px;
    letter-spacing: 0.08em;
  }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 2px;
    padding: 12px 20px;
    font-size: 12px;
    color: var(--text);
    z-index: 9999;
    transform: translateY(80px);
    opacity: 0;
    transition: transform 0.3s, opacity 0.3s;
  }

  .toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 768px) {
    .header { padding: 0 16px; }
    .main { padding: 16px; }
    .modal { padding: 24px 20px; margin: 16px; }
    .modal-row { grid-template-columns: 1fr; }
    .stat-pill { display: none; }
  }
</style>
</head>

<script>
const SUPABASE_URL = 'https://xehvixxyhlcpbwxxnbcg.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Om5UsFPaBv1pkIa6yYaowA_sBPswomo';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const CATEGORIES = [
  { key: 'Published', label: 'Published' },
  { key: 'Submitted', label: 'Submitted' },
  { key: 'Active', label: 'Active Manuscripts' },
  { key: 'Pipeline', label: 'Pipeline' },
  { key: 'Genetics', label: 'Genetics / deCODE Projects' },
  { key: 'IgM', label: "IgM / Waldenström's" },
  { key: 'Reviews', label: 'Reviews' },
  { key: 'Ideas', label: 'Ideas' },
];

const STATUS_CYCLE = ['In preparation', 'Submitted', 'Under review', 'Accepted', 'Published'];

let allPapers = [];
let editingId = null;

// AUTH
async function login() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';

  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { errEl.textContent = error.message; return; }
  showApp();
}

async function logout() {
  await sb.auth.signOut();
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

async function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  await loadPapers();
}

// CHECK SESSION
sb.auth.getSession().then(({ data: { session } }) => {
  if (session) showApp();
});

// DATA
async function loadPapers() {
  const { data, error } = await sb.from('papers').select('*').order('created_at', { ascending: true });
  if (error) { showToast('Error loading papers'); return; }
  allPapers = data || [];
  render();
}

async function savePaper() {
  const paper = {
    title: document.getElementById('f-title').value.trim(),
    first_author: document.getElementById('f-author').value.trim(),
    category: document.getElementById('f-category').value,
    journal: document.getElementById('f-journal').value.trim(),
    status: document.getElementById('f-status').value,
    notes: document.getElementById('f-notes').value.trim(),
  };

  if (!paper.title) { showToast('Title is required'); return; }

  if (editingId) {
    const { error } = await sb.from('papers').update(paper).eq('id', editingId);
    if (error) { showToast('Error saving'); return; }
    showToast('Paper updated');
  } else {
    const { error } = await sb.from('papers').insert(paper);
    if (error) { showToast('Error saving'); return; }
    showToast('Paper added');
  }

  closeModal();
  await loadPapers();
}

async function cycleStatus(id, currentStatus, e) {
  e.stopPropagation();
  const idx = STATUS_CYCLE.indexOf(currentStatus);
  const next = STATUS_CYCLE[(idx + 1) % STATUS_CYCLE.length];
  const { error } = await sb.from('papers').update({ status: next }).eq('id', id);
  if (error) { showToast('Error updating status'); return; }
  await loadPapers();
}

async function deletePaper(id, e) {
  e.stopPropagation();
  if (!confirm('Delete this paper?')) return;
  await sb.from('papers').delete().eq('id', id);
  await loadPapers();
  showToast('Paper deleted');
}

// MODAL
function openModal(paper = null) {
  editingId = paper ? paper.id : null;
  document.getElementById('modal-title').textContent = paper ? 'Edit Paper' : 'Add Paper';
  document.getElementById('f-title').value = paper?.title || '';
  document.getElementById('f-author').value = paper?.first_author || '';
  document.getElementById('f-category').value = paper?.category || 'Active';
  document.getElementById('f-journal').value = paper?.journal || '';
  document.getElementById('f-status').value = paper?.status || 'In preparation';
  document.getElementById('f-notes').value = paper?.notes || '';
  document.getElementById('modal-overlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('active');
  editingId = null;
}

document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// RENDER
function render() {
  const published = allPapers.filter(p => p.status === 'Published').length;
  document.getElementById('stat-published').innerHTML = `Published: <span>${published}</span>`;
  document.getElementById('stat-total').innerHTML = `Total: <span>${allPapers.length}</span>`;

  const main = document.getElementById('main-content');
  main.innerHTML = '';

  CATEGORIES.forEach(cat => {
    const papers = allPapers.filter(p => p.category === cat.key);

    const section = document.createElement('div');
    section.className = 'category-section';

    section.innerHTML = `
      <div class="category-header">
        <div class="category-name">${cat.label}</div>
        <div class="category-count">${papers.length} paper${papers.length !== 1 ? 's' : ''}</div>
      </div>
      ${papers.length === 0 ? '<div class="empty-state">No papers in this category yet.</div>' : `
      <table class="papers-table">
        <thead>
          <tr>
            <th style="width:40%">Title</th>
            <th>First Author</th>
            <th>Journal</th>
            <th>Status</th>
            <th>Notes</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${papers.map(p => {
            const statusClass = 'status-' + p.status.replace(/\s+/g, '-');
            return `
            <tr class="paper-row" onclick="openModal(${JSON.stringify(p).replace(/"/g, '&quot;')})">
              <td><div class="paper-title">${p.title || '—'}</div></td>
              <td><div class="paper-author">${p.first_author || '—'}</div></td>
              <td><div class="paper-journal" title="${p.journal || ''}">${p.journal || '—'}</div></td>
              <td>
                <span class="status-badge ${statusClass}" 
                  onclick="cycleStatus(${p.id}, '${p.status}', event)" 
                  title="Click to cycle status">
                  ${p.status}
                </span>
              </td>
              <td><div class="paper-notes" title="${p.notes || ''}">${p.notes || '—'}</div></td>
              <td>
                <button class="delete-btn" onclick="deletePaper(${p.id}, event)" title="Delete">✕</button>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>`}
    `;

    main.appendChild(section);
  });
}

// TOAST
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// KEYBOARD
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') login();
});
</script>
